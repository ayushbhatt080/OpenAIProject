<div class="card">
  <div class="header-section">
    <div class="header-title">
      <h2>🌍 Travel Packages</h2>
      <p *ngIf="packages.length === 0 && !loading" class="no-data">No travel packages found.</p>
    </div>
    <button class="btn-primary" (click)="createPackage()">+ New Package</button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>
  <div *ngIf="loading" class="alert alert-info">Loading packages...</div>

  <table *ngIf="packages.length > 0" class="table">
    <thead>
      <tr>
        <th>Title</th>
        <th>Destination</th>
        <th>Price</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let pkg of packages">
        <td><strong>{{ pkg.title }}</strong></td>
        <td>{{ pkg.destination }}</td>
        <td><span class="price-badge">₹{{ pkg.price | number:'1.0-2' }}</span></td>
        <td>{{ pkg.description }}</td>
        <td class="table-actions">
          <button (click)="editPackage(pkg)">Edit</button>
          <button (click)="deletePackage(pkg)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
